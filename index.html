<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yaya' Brownies</title>

<link href="https://fonts.googleapis.com/css2?family=Merienda:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Merienda',cursive;
}

body{

min-height:100svh;

display:flex;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.30),rgba(0,0,0,0.30)),
url("fundo.jpg");

background-size:cover;
background-position:center;

color:white;

}

.container{

width:100%;
max-width:420px;

display:flex;
flex-direction:column;
align-items:center;

padding:22px 16px 10px;

}

/* LOGO */

.logo{

width:165px;
margin-bottom:16px;

animation:fadeDown .6s ease;

}

/* CIDADES */

.city{

font-size:20px;
letter-spacing:2px;

margin-top:18px;
margin-bottom:10px;

text-shadow:0 3px 8px rgba(0,0,0,.65);

animation:fadeUp .7s ease;

}

/* ITEM LINK */

.link-item{

position:relative;
width:100%;

display:flex;
justify-content:center;

margin-bottom:9px;

}

/* ICONES */

.link-item img{

position:absolute;

left:calc(50% - 118px);

width:24px;
height:24px;

}

/* BOTÕES */

.btn{

width:58%;
max-width:200px;

padding:6px 10px;

background:#8a5526;

border-radius:16px;

text-align:center;
text-decoration:none;

color:white;

font-size:14px;

box-shadow:
0 3px 6px rgba(0,0,0,.35);

transition:
transform .12s ease,
box-shadow .12s ease,
filter .12s ease;

}

/* HOVER */

.btn:hover{

transform:translateY(-1px);

box-shadow:
0 5px 10px rgba(0,0,0,.45);

filter:brightness(1.06);

}

/* PRESS */

.btn:active{

transform:translateY(1px);

box-shadow:
0 2px 4px rgba(0,0,0,.35);

}

/* RODAPÉ */

footer{

margin-top:18px;

font-size:13px;

text-align:center;

text-shadow:0 2px 6px rgba(0,0,0,.7);

opacity:.95;

}

/* ANIMAÇÕES */

@keyframes fadeDown{

from{
opacity:0;
transform:translateY(-10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* DESKTOP */

@media(min-width:768px){

body{
align-items:center;
}

.container{

background:rgba(0,0,0,0.15);

border-radius:22px;

padding:26px 18px 14px;

}

}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="city">ARAUCÁRIA</div>

<div class="link-item">
<img src="ifood.png">
<a class="btn" href="https://www.ifood.com.br/delivery/araucaria-pr/yaya-brownies-artesanais-e-acai-tindiquera/f7fbff6c-4151-4fe5-8836-59870a09d3cf">Peça no iFood</a>
</div>

<div class="link-item">
<img src="99food.png">
<a class="btn" href="https://oia.99app.com/dlp9/UlueR3?share_media=WHATSAPP">Peça no 99Food</a>
</div>

<div class="link-item">
<img src="whatsapp.png">
<a class="btn" href="https://wa.me/message/UORQT3Q2FA3SB1">Fale com a gente</a>
</div>

<div class="city">CURITIBA</div>

<div class="link-item">
<img src="ifood.png">
<a class="btn" href="https://www.ifood.com.br/delivery/curitiba-pr/yaya-brownies-artesanais-cidade-industrial/90464248-2c05-4a0a-9df8-e379aad73bca">Peça no iFood</a>
</div>

<div class="link-item">
<img src="99food.png">
<a class="btn" href="https://oia.99app.com/dlp9/GYzFDj?share_media=WHATSAPP">Em breve</a>
</div>

<div class="link-item">
<img src="whatsapp.png">
<a class="btn" href="https://wa.me/message/R4Z5JRBBXQKLD1">Fale com a gente</a>
</div>

<footer>
Os melhores brownies de Curitiba e região.
</footer>

</div>

</body>
</html>
